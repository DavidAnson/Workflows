name: Check links in Markdown files (linkinator CLI)

on:
  pull_request:
  push:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v2
        with:
          repository: DavidAnson/markdownlint
      - name: Install linkinator
        run: npm install linkinator --no-package-lock
      - name: Run linkinator
        run: ./node_modules/.bin/linkinator '**/*.md' --directory-listing --markdown --skip 'node_modules/ test/ ^https://github.com/.*/search\?q='
  markdownlint-cli2:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v2
        with:
          repository: DavidAnson/markdownlint-cli2
      - name: Install linkinator
        run: npm install linkinator --no-package-lock
      - name: Run linkinator
        run: ./node_modules/.bin/linkinator '**/*.md' --directory-listing --markdown --skip 'node_modules/ test/'
  vscode-markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v2
        with:
          repository: DavidAnson/vscode-markdownlint
      - name: Install linkinator
        run: npm install linkinator --no-package-lock
      - name: Run linkinator
        run: ./node_modules/.bin/linkinator '**/*.md' --directory-listing --markdown --skip 'node_modules/'
